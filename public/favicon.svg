<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#080e0a"/>
  <!-- Golf flag pin -->
  <line x1="14" y1="6" x2="14" y2="24" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flag -->
  <polygon points="14,6 22,10 14,14" fill="#e3b341"/>
  <!-- Ground line -->
  <line x1="8" y1="24" x2="24" y2="24" stroke="#1c2e20" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Trend arrow -->
  <polyline points="6,22 10,18 14,20 18,14 22,16 26,10"
    fill="none" stroke="#26a641" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
